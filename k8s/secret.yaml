# Credentials shared by the postgres StatefulSet and the backend Deployment.
# In production, manage this with an external secrets manager or Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: tusas-postgres-secret
  namespace: tusas-vitrin
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres
