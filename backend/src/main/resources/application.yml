spring:
  config:
    import: "optional:file:../.env[.properties]"
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

producer:
  # Container image used when spawning a producer pod via POST /api/producer/spawn.
  # Override this with the fully-qualified registry path in production.
  image: tusas-vitrin-producer:latest
  # Kubernetes namespace in which producer pods are created.
  namespace: tusas-vitrin

logging:
  level:
    com.tusas.vitrin: DEBUG
    org.springframework.web.socket: DEBUG
